<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Wardrobe</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Upload, Plus, X, Check, Download, UploadCloud, Edit2, Save, Trash2, Loader } = lucide;

    const ImageIcon = ({ className }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    function VirtualWardrobe() {
      const [wardrobeData, setWardrobeData] = useState({ outfits: [] });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [successMessage, setSuccessMessage] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [selectedOutfit, setSelectedOutfit] = useState(null);
      const [activeFilters, setActiveFilters] = useState([]);
      const [view, setView] = useState('gallery');
      const [editingDetailItem, setEditingDetailItem] = useState(null);
      const [outfitImage, setOutfitImage] = useState(null);
      const [outfitItems, setOutfitItems] = useState([{ name: '', type: 'other', color: '#3b82f6', inRealWardrobe: false }]);

      useEffect(() => { loadWardrobeData(); }, []);
      useEffect(() => {
        const preventDefaults = (e) => { e.preventDefault(); e.stopPropagation(); };
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
          document.body.addEventListener(eventName, preventDefaults);
        });
        return () => {
          ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.body.removeEventListener(eventName, preventDefaults);
          });
        };
      }, []);

      const loadWardrobeData = async () => {
        setLoading(true);
        try {
          const stored = localStorage.getItem('wardrobe-data');
          if (stored) {
            const data = JSON.parse(stored);
            setWardrobeData(data.items && !data.outfits ? { outfits: [] } : data);
          } else {
            const initialData = { outfits: [] };
            localStorage.setItem('wardrobe-data', JSON.stringify(initialData));
            setWardrobeData(initialData);
          }
        } catch (err) {
          setWardrobeData({ outfits: [] });
        } finally {
          setLoading(false);
        }
      };

      const saveWardrobeData = (data) => {
        localStorage.setItem('wardrobe-data', JSON.stringify(data));
      };

      const fileToBase64 = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const handleDrop = async (e) => {
        e.preventDefault(); e.stopPropagation(); setIsDragging(false);
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          const imageBase64 = await fileToBase64(file);
          setOutfitImage(imageBase64);
          setView('add');
        }
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
      const handleDragEnter = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); if (e.target === e.currentTarget) setIsDragging(false); };

      const handleFileSelect = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const imageBase64 = await fileToBase64(file);
          setOutfitImage(imageBase64);
          setView('add');
        }
      };

      const updateItem = (index, field, value) => {
        const updated = [...outfitItems];
        updated[index] = { ...updated[index], [field]: value };
        setOutfitItems(updated);
      };

      const addNewItem = () => {
        setOutfitItems([...outfitItems, { name: '', type: 'other', color: '#3b82f6', inRealWardrobe: false }]);
      };

      const removeItem = (index) => {
        if (outfitItems.length > 1) {
          setOutfitItems(outfitItems.filter((_, i) => i !== index));
        }
      };

      const generateOutfitName = () => outfitItems.filter(i => i.name).map(item => item.name).join(', ');

      const addOutfit = () => {
        const validItems = outfitItems.filter(i => i.name.trim());
        if (validItems.length === 0) { setError('Please add at least one item name'); setTimeout(() => setError(null), 3000); return; }
        if (!outfitImage) { setError('Please add an image'); setTimeout(() => setError(null), 3000); return; }

        const newOutfit = {
          id: Date.now().toString(),
          name: generateOutfitName(),
          items: validItems,
          imageUrl: outfitImage,
          dateAdded: new Date().toISOString(),
          inRealWardrobe: validItems.some(item => item.inRealWardrobe)
        };
        
        const updatedData = { outfits: [...wardrobeData.outfits, newOutfit] };
        setWardrobeData(updatedData);
        saveWardrobeData(updatedData);
        setOutfitImage(null);
        setOutfitItems([{ name: '', type: 'other', color: '#3b82f6', inRealWardrobe: false }]);
        setView('gallery');
        setSuccessMessage('Outfit added');
        setTimeout(() => setSuccessMessage(null), 3000);
      };

      const updateOutfitItem = (itemIndex, field, value) => {
        const updatedItems = [...selectedOutfit.items];
        updatedItems[itemIndex] = { ...updatedItems[itemIndex], [field]: value };
        setSelectedOutfit({
          ...selectedOutfit,
          items: updatedItems,
          name: updatedItems.map(item => item.name).join(', '),
          inRealWardrobe: updatedItems.some(item => item.inRealWardrobe)
        });
      };

      const saveOutfitChanges = () => {
        const updatedData = { outfits: wardrobeData.outfits.map(outfit => outfit.id === selectedOutfit.id ? selectedOutfit : outfit) };
        setWardrobeData(updatedData);
        saveWardrobeData(updatedData);
        setEditingDetailItem(null);
        setSuccessMessage('Changes saved');
        setTimeout(() => setSuccessMessage(null), 3000);
      };

      const handleDeleteOutfit = (outfitId, e) => {
        if (e) e.stopPropagation();
        const updatedData = { outfits: wardrobeData.outfits.filter(outfit => outfit.id !== outfitId) };
        setWardrobeData(updatedData);
        setSelectedOutfit(null);
        setSuccessMessage('Outfit deleted');
        setTimeout(() => setSuccessMessage(null), 3000);
        saveWardrobeData(updatedData);
      };

      const handleExport = () => {
        const dataStr = JSON.stringify(wardrobeData, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `wardrobe-backup-${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
        setSuccessMessage('Wardrobe exported');
        setTimeout(() => setSuccessMessage(null), 3000);
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            setWardrobeData(importedData);
            saveWardrobeData(importedData);
            setSuccessMessage('Wardrobe imported');
            setTimeout(() => setSuccessMessage(null), 3000);
          } catch (err) { setError('Failed to import data'); setTimeout(() => setError(null), 3000); }
        };
        reader.readAsText(file);
      };

      const toggleFilter = (itemName, e) => {
        e.stopPropagation();
        setActiveFilters(activeFilters.includes(itemName) ? activeFilters.filter(f => f !== itemName) : [...activeFilters, itemName]);
      };

      const removeFilter = (itemName) => setActiveFilters(activeFilters.filter(f => f !== itemName));

      const getFilteredOutfits = () => {
        if (activeFilters.length === 0) return wardrobeData.outfits;
        return wardrobeData.outfits.filter(outfit => activeFilters.every(filter => outfit.items.some(item => item.name === filter)));
      };

      const filteredOutfits = getFilteredOutfits();

      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center">
            <Loader className="w-12 h-12 animate-spin text-blue-600" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50" onDrop={view === 'gallery' ? handleDrop : undefined} onDragOver={view === 'gallery' ? handleDragOver : undefined} onDragEnter={view === 'gallery' ? handleDragEnter : undefined} onDragLeave={view === 'gallery' ? handleDragLeave : undefined}>
          
          {(successMessage || error) && (
            <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[100]">
              {successMessage && <div className="bg-black text-white px-6 py-3 rounded-lg shadow-2xl">{successMessage}</div>}
              {error && <div className="bg-black text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3"><span>{error}</span><button onClick={() => setError(null)}><X className="w-4 h-4" /></button></div>}
            </div>
          )}

          {isDragging && view === 'gallery' && (
            <div className="fixed inset-0 bg-blue-500 bg-opacity-20 flex items-center justify-center z-50 pointer-events-none">
              <div className="bg-white rounded-2xl shadow-2xl p-12 border-4 border-blue-500 border-dashed">
                <Upload className="w-20 h-20 text-blue-600 mx-auto mb-4" />
                <p className="text-2xl font-bold text-gray-800">Drop outfit image here</p>
              </div>
            </div>
          )}

          {view === 'add' && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 p-4" onClick={() => { setView('gallery'); setOutfitImage(null); setOutfitItems([{ name: '', type: 'other', color: '#3b82f6', inRealWardrobe: false }]); }}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-hidden" onClick={(e) => e.stopPropagation()}>
                <div className="grid grid-cols-1 md:grid-cols-2 h-full max-h-[90vh]">
                  <div className="bg-gray-100 flex items-center justify-center">
                    <img src={outfitImage} alt="Outfit" className="w-full h-full object-contain" />
                  </div>
                  <div className="p-8 overflow-y-auto">
                    <div className="flex items-center justify-between mb-6">
                      <h2 className="text-2xl font-bold text-gray-800">Add Outfit Items</h2>
                      <button onClick={() => { setView('gallery'); setOutfitImage(null); setOutfitItems([{ name: '', type: 'other', color: '#3b82f6', inRealWardrobe: false }]); }} className="p-2 text-gray-400 hover:text-gray-600"><X className="w-6 h-6" /></button>
                    </div>
                    <div className="space-y-4 mb-6">
                      {outfitItems.map((item, index) => (
                        <div key={index} className="border border-gray-200 rounded-lg p-4">
                          <div className="flex items-center gap-3 mb-3">
                            <input type="color" value={item.color} onChange={(e) => updateItem(index, 'color', e.target.value)} className="w-12 h-12 rounded cursor-pointer" />
                            <input type="text" value={item.name} onChange={(e) => updateItem(index, 'name', e.target.value)} placeholder="e.g., Black jacket" className="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                            {outfitItems.length > 1 && (
                              <button onClick={() => removeItem(index)} className="p-2 text-red-600 hover:bg-red-50 rounded"><X className="w-5 h-5" /></button>
                            )}
                          </div>
                          <select value={item.type} onChange={(e) => updateItem(index, 'type', e.target.value)} className="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg mb-3">
                            <option value="jacket">Jacket</option><option value="shirt">Shirt</option><option value="t-shirt">T-Shirt</option><option value="sweater">Sweater</option><option value="hoodie">Hoodie</option><option value="pants">Pants</option><option value="jeans">Jeans</option><option value="shorts">Shorts</option><option value="skirt">Skirt</option><option value="dress">Dress</option><option value="shoes">Shoes</option><option value="sneakers">Sneakers</option><option value="boots">Boots</option><option value="hat">Hat</option><option value="accessory">Accessory</option><option value="other">Other</option>
                          </select>
                          <label className="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" checked={item.inRealWardrobe} onChange={(e) => updateItem(index, 'inRealWardrobe', e.target.checked)} className="w-4 h-4 text-blue-600 rounded" />
                            <span className="text-gray-700">I own this item</span>
                          </label>
                        </div>
                      ))}
                    </div>
                    <button onClick={addNewItem} className="w-full mb-6 px-4 py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-blue-500 hover:text-blue-600 transition-colors">
                      <Plus className="w-5 h-5 inline mr-2" />Add Another Item
                    </button>
                    <div className="flex gap-3">
                      <button onClick={() => { setView('gallery'); setOutfitImage(null); setOutfitItems([{ name: '', type: 'other', color: '#3b82f6', inRealWardrobe: false }]); }} className="flex-1 px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                      <button onClick={addOutfit} className="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">Add Outfit</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {selectedOutfit && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={() => { setSelectedOutfit(null); setEditingDetailItem(null); }}>
              <div className="bg-white rounded-2xl shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-hidden" onClick={(e) => e.stopPropagation()}>
                <div className="grid grid-cols-1 md:grid-cols-2 h-full max-h-[90vh]">
                  <div className="bg-gray-100 flex items-center justify-center p-8">
                    <img src={selectedOutfit.imageUrl} alt={selectedOutfit.name} className="max-h-full max-w-full object-contain rounded-lg" />
                  </div>
                  <div className="p-8 overflow-y-auto">
                    <div className="flex items-start justify-between mb-6">
                      <h2 className="text-2xl font-bold text-gray-800">{selectedOutfit.name}</h2>
                      <button onClick={() => { setSelectedOutfit(null); setEditingDetailItem(null); }} className="p-2 text-gray-400 hover:text-gray-600"><X className="w-6 h-6" /></button>
                    </div>
                    <div className="space-y-4 mb-8">
                      {selectedOutfit.items.map((item, index) => (
                        <div key={index} className="border border-gray-200 rounded-lg p-4">
                          <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-3 flex-1">
                              <div className="w-8 h-8 rounded-full border-2 border-gray-300 shadow-sm" style={{ backgroundColor: item.color }} />
                              {editingDetailItem === index ? (
                                <input type="text" value={item.name} onChange={(e) => updateOutfitItem(index, 'name', e.target.value)} className="flex-1 px-2 py-1 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" autoFocus />
                              ) : (
                                <h4 className="font-semibold text-gray-800">{item.name}</h4>
                              )}
                            </div>
                            <div className="flex items-center gap-2">
                              {item.inRealWardrobe && <div className="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-semibold flex items-center gap-1"><Check className="w-3 h-3" />Owned</div>}
                              <button onClick={() => { if (editingDetailItem === index) saveOutfitChanges(); setEditingDetailItem(editingDetailItem === index ? null : index); }} className="p-1 text-blue-600 hover:bg-blue-50 rounded">{editingDetailItem === index ? <Save className="w-4 h-4" /> : <Edit2 className="w-4 h-4" />}</button>
                            </div>
                          </div>
                          {editingDetailItem === index && (
                            <>
                              <select value={item.type} onChange={(e) => updateOutfitItem(index, 'type', e.target.value)} className="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg mb-3">
                                <option value="jacket">Jacket</option><option value="shirt">Shirt</option><option value="t-shirt">T-Shirt</option><option value="sweater">Sweater</option><option value="hoodie">Hoodie</option><option value="pants">Pants</option><option value="jeans">Jeans</option><option value="shorts">Shorts</option><option value="skirt">Skirt</option><option value="dress">Dress</option><option value="shoes">Shoes</option><option value="sneakers">Sneakers</option><option value="boots">Boots</option><option value="hat">Hat</option><option value="accessory">Accessory</option><option value="other">Other</option>
                              </select>
                              <input type="color" value={item.color} onChange={(e) => updateOutfitItem(index, 'color', e.target.value)} className="w-full h-12 rounded cursor-pointer mb-3" />
                              <label className="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="checkbox" checked={item.inRealWardrobe} onChange={(e) => updateOutfitItem(index, 'inRealWardrobe', e.target.checked)} className="w-4 h-4 text-blue-600 rounded" />
                                <span className="text-gray-700">I own this item</span>
                              </label>
                            </>
                          )}
                        </div>
                      ))}
                    </div>
                    <button onClick={() => handleDeleteOutfit(selectedOutfit.id)} className="w-full px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700">Delete Outfit</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          <header className="bg-white shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center"><ImageIcon className="w-6 h-6 text-white" /></div>
                  <h1 className="text-2xl font-bold text-gray-800">Virtual Wardrobe</h1>
                </div>
                <div className="flex items-center gap-3 flex-wrap">
                  <button onClick={handleExport} className="flex items-center gap-2 px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50"><Download className="w-4 h-4" />Export</button>
                  <label className="flex items-center gap-2 px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 cursor-pointer"><UploadCloud className="w-4 h-4" />Import<input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
                  <label className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer"><Plus className="w-5 h-5" />Upload<input type="file" accept="image/*" onChange={handleFileSelect} className="hidden" /></label>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {wardrobeData.outfits.length === 0 ? (
              <div className="text-center py-20 bg-white rounded-2xl shadow-lg border-2 border-dashed border-gray-300">
                <ImageIcon className="w-20 h-20 text-gray-300 mx-auto mb-4" />
                <h3 className="text-xl font-semibold text-gray-700 mb-2">No outfits yet</h3>
                <p className="text-gray-500 mb-6">Drag and drop an outfit image or click to upload</p>
                <label className="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer"><Plus className="w-5 h-5" />Upload<input type="file" accept="image/*" onChange={handleFileSelect} className="hidden" /></label>
              </div>
            ) : (
              <>
                <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
                  <div className="flex items-center gap-3 flex-wrap">
                    <h2 className="text-2xl font-bold text-gray-800">{filteredOutfits.length} {filteredOutfits.length === 1 ? 'outfit' : 'outfits'}{activeFilters.length > 0 && ' with'}</h2>
                    {activeFilters.map((filter) => (
                      <div key={filter} className="flex items-center gap-2 bg-blue-100 text-blue-800 px-3 py-1.5 rounded-lg text-sm font-medium">
                        <span>{filter}</span>
                        <button onClick={() => removeFilter(filter)} className="hover:bg-blue-200 rounded-full p-0.5"><X className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="grid grid-cols-4 lg:grid-cols-4 gap-4">
                  {filteredOutfits.map((outfit) => (
                    <div key={outfit.id} className="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-shadow cursor-pointer" onClick={() => setSelectedOutfit(outfit)}>
                      <div className="relative aspect-[3/4] bg-gray-100 group">
                        <img src={outfit.imageUrl} alt={outfit.name} className="w-full h-full object-cover" />
                        <button onClick={(e) => handleDeleteOutfit(outfit.id, e)} className="absolute top-2 right-2 z-10 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600"><Trash2 className="w-4 h-4" /></button>
                      </div>
                      <div className="p-3" onClick={(e) => e.stopPropagation()}>
                        <div className="flex flex-wrap gap-2">
                          {outfit.items.map((item, idx) => (
                            <button key={idx} onClick={(e) => toggleFilter(item.name, e)} className={`flex items-center gap-1.5 px-2.5 py-1 text-xs rounded-lg transition-colors ${activeFilters.includes(item.name) ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                              <div className="w-3 h-3 rounded-full border border-white shadow-sm" style={{ backgroundColor: item.color }} />
                              <span>{item.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.render(<VirtualWardrobe />, document.getElementById('root'));
  </script>
</body>
</html>
