<!DOCTYPE html>
<html>
<head>
<link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
<link rel="icon" href="favicon/apple-touch-icon.png">
<style>
  .coin-wrap {
    width: 140px;
    height: 140px;
    perspective: 800px;
    cursor: pointer;
    position: relative;
  }

  .coin-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    backface-visibility: hidden; /* hides each face when it's turned away from you */
  }

  #faceA { transform: rotateY(0deg); }
  #faceB { transform: rotateY(180deg);
   } /* starts pre-flipped, facing away */

  @keyframes flipA {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(720deg); }
  }
  @keyframes flipB {
    0%   { transform: rotateY(180deg); }
    100% { transform: rotateY(900deg); } /* same rotation, offset by 180deg */
  }

  .flippingA { animation: flipA 0.9s linear; }
  .flippingB { animation: flipB 0.9s linear; }
</style>
</head>
<body>
  <div class="coin-wrap" id="coinWrap">
    <img class="coin-face" id="faceA" src="https://picsum.photos/id/64/300/300.jpg" alt="">
    <img class="coin-face" id="faceB" src="https://picsum.photos/id/64/300/300.jpg" alt="">
  </div>

  <script>
    const wrap = document.getElementById('coinWrap');
    const a = document.getElementById('faceA');
    const b = document.getElementById('faceB');

    wrap.addEventListener('mouseenter', () => {
      a.classList.remove('flippingA');
      b.classList.remove('flippingB');
      void a.offsetWidth;
      a.classList.add('flippingA');
      b.classList.add('flippingB');
    });

    a.addEventListener('animationend', () => {
      a.classList.remove('flippingA');
      b.classList.remove('flippingB');
    });
  </script>
</body>
</html>
